name: Keep Render Alive

on:
  schedule:
    # Runs every 14 minutes
    - cron: '*/14 * * * *'
  # Allows manual triggering of the workflow from the Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: |
          curl -s https://meq3d-backend-yt-music.onrender.com/api/health
