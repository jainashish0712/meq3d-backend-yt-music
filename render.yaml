services:
  - type: web
    name: youtube-music-backend
    runtime: node
    plan: free
    buildCommand: chmod +x ./render-build.sh && ./render-build.sh
    startCommand: node src/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CACHE_TTL_SECONDS
        value: 14400
      - key: LOG_LEVEL
        value: combined
